redis:
  host: "redis"
  port: 6379
  pool_size: 10
  max_connections: 20
  decode_responses: false

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

producers:
  node_fills:
    enabled: true
    log_path: "/home/hluser/hl/data/node_fills/hourly"
    coins: ["BTC", "ETH", "HYPE"]
    stream_prefix: "node_fills"
    max_retention: 100000
    batch_size: 1000
    poll_interval_ms: 1
    
  # Future data sources
  orderbook:
    enabled: false
    log_path: "/home/hluser/hl/data/node_raw_book_diffs/hourly"
    stream_prefix: "orderbook"
    max_retention: 50000
    
  liquidations:
    enabled: false  
    log_path: "/home/hluser/hl/data/misc_events/hourly"
    stream_prefix: "liquidations"
    max_retention: 10000

performance:
  mmap_buffer_size: 1048576  # 1MB
  read_buffer_size: 65536    # 64KB
  max_batch_size: 1000
  cpu_affinity: null         # Pin to specific cores if needed