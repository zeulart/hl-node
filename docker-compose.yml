name: "hyperliquid"

services:
  node:
    restart: unless-stopped
    build: .
    ports:
      - "4000-4010:4000-4010"
      - "3001:3001"
    volumes:
      - hl-data:/home/hluser/hl/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"  # Expose for external Docker access
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - ./redis/init-redis.sh:/usr/local/bin/init-redis.sh:ro
    command: >
      sh /usr/local/bin/init-redis.sh
    environment:
      - REDIS_PASSWORD_FILE=/run/secrets/redis_password
    secrets:
      - redis_password
    sysctls:
      - net.core.somaxconn=65535

  pruner:
    restart: unless-stopped
    build: ./pruner
    volumes:
      - hl-data:/home/hluser/hl/data

  log-streamer:
    build: ./streaming
    restart: unless-stopped
    volumes:
      - hl-data:/home/hluser/hl/data:ro
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOG_PATH=/home/hluser/hl/data/node_fills/hourly
      - PIPELINE_SIZE=20
      - REDIS_PASSWORD_FILE=/run/secrets/redis_password
    secrets:
      - redis_password

volumes:
  hl-data:
    driver: local
  redis-data:
    driver: local

secrets:
  redis_password:
    file: ./redis/redis_password.txt
