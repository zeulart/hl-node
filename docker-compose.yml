name: "hyperliquid"

services:
  node:
    restart: unless-stopped
    build: .
    ports:
      - "4000-4010:4000-4010"
      - "3001:3001"
    volumes:
      - hl-data:/home/hluser/hl/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"  # Expose for external Docker access
    volumes:
      - redis-data:/data
      - ./redis/init-redis.sh:/usr/local/bin/init-redis.sh:ro
      - ./redis/generate-config.sh:/usr/local/bin/generate-config.sh:ro
    command: >
      sh /usr/local/bin/init-redis.sh
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    sysctls:
      - net.core.somaxconn=65535

  pruner:
    restart: unless-stopped
    build: ./pruner
    volumes:
      - hl-data:/home/hluser/hl/data

  log-streamer:
    build: ./streaming
    restart: unless-stopped
    volumes:
      - hl-data:/home/hluser/hl/data:ro
    depends_on:
      - redis
    environment:
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - LOG_PATH=${LOG_PATH:-/home/hluser/hl/data/node_fills/hourly}
      - PIPELINE_SIZE=${PIPELINE_SIZE:-20}
      - REDIS_PASSWORD=${REDIS_PASSWORD}

volumes:
  hl-data:
    driver: local
  redis-data:
    driver: local
